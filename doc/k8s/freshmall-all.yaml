apiVersion: v1
kind: Namespace
metadata:
  name: freshmall
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-data
  namespace: freshmall
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: upload-data
  namespace: freshmall
spec:
  accessModes: ["ReadWriteMany"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: freshmall
type: Opaque
stringData:
  root-password: root
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: freshmall
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: root-password
            - name: MYSQL_DATABASE
              value: freshmall_db
          args:
            - --character-set-server=utf8mb4
            - --collation-server=utf8mb4_unicode_ci
            - --default-time-zone=+08:00
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
          readinessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 40
            periodSeconds: 20
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: mysql-data
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: freshmall
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nacos
  namespace: freshmall
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nacos
  template:
    metadata:
      labels:
        app: nacos
    spec:
      containers:
        - name: nacos
          image: nacos/nacos-server:v2.4.3
          env:
            - name: MODE
              value: standalone
            - name: SPRING_DATASOURCE_PLATFORM
              value: derby
          ports:
            - containerPort: 8848
          readinessProbe:
            tcpSocket:
              port: 8848
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8848
            initialDelaySeconds: 40
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: nacos
  namespace: freshmall
spec:
  selector:
    app: nacos
  ports:
    - port: 8848
      targetPort: 8848
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: freshmall-user
  namespace: freshmall
spec:
  replicas: 1
  selector:
    matchLabels:
      app: freshmall-user
  template:
    metadata:
      labels:
        app: freshmall-user
    spec:
      containers:
        - name: app
          image: local/freshmall-user:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 9201
          env:
            - name: SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR
              value: nacos:8848
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/freshmall_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=UTC
            - name: SPRING_DATASOURCE_USERNAME
              value: root
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: root-password
            - name: FILE_UPLOADPATH
              value: /data/upload
          volumeMounts:
            - name: upload-data
              mountPath: /data/upload
          readinessProbe:
            tcpSocket:
              port: 9201
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9201
            initialDelaySeconds: 40
            periodSeconds: 20
      volumes:
        - name: upload-data
          persistentVolumeClaim:
            claimName: upload-data
---
apiVersion: v1
kind: Service
metadata:
  name: freshmall-user
  namespace: freshmall
spec:
  selector:
    app: freshmall-user
  ports:
    - port: 9201
      targetPort: 9201
---
