apiVersion: v1
kind: Namespace
metadata:
  name: freshmall
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-data
  namespace: freshmall
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: upload-data
  namespace: freshmall
spec:
  accessModes: ["ReadWriteMany"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
  namespace: freshmall
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rabbitmq-data
  namespace: freshmall
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: freshmall
type: Opaque
stringData:
  root-password: root
---
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-secret
  namespace: freshmall
type: Opaque
stringData:
  username: guest
  password: guest
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: freshmall
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: root-password
            - name: MYSQL_DATABASE
              value: freshmall_db
          args:
            - --character-set-server=utf8mb4
            - --collation-server=utf8mb4_unicode_ci
            - --default-time-zone=+08:00
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
          readinessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 40
            periodSeconds: 20
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: mysql-data
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: freshmall
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nacos
  namespace: freshmall
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nacos
  template:
    metadata:
      labels:
        app: nacos
    spec:
      containers:
        - name: nacos
          image: nacos/nacos-server:v2.4.3
          env:
            - name: MODE
              value: standalone
            - name: SPRING_DATASOURCE_PLATFORM
              value: derby
          ports:
            - containerPort: 8848
          readinessProbe:
            tcpSocket:
              port: 8848
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8848
            initialDelaySeconds: 40
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: nacos
  namespace: freshmall
spec:
  selector:
    app: nacos
  ports:
    - port: 8848
      targetPort: 8848
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: freshmall
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args:
            - redis-server
            - --appendonly
            - yes
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-data
              mountPath: /data
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 20
            periodSeconds: 20
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: freshmall
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: freshmall
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management-alpine
          ports:
            - containerPort: 5672
            - containerPort: 15672
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: username
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: password
          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
          readinessProbe:
            tcpSocket:
              port: 5672
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 5672
            initialDelaySeconds: 40
            periodSeconds: 20
      volumes:
        - name: rabbitmq-data
          persistentVolumeClaim:
            claimName: rabbitmq-data
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: freshmall
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: freshmall-user
  namespace: freshmall
spec:
  replicas: 1
  selector:
    matchLabels:
      app: freshmall-user
  template:
    metadata:
      labels:
        app: freshmall-user
    spec:
      containers:
        - name: app
          image: local/freshmall-user:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 9201
          env:
            - name: SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR
              value: nacos:8848
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/freshmall_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=UTC
            - name: SPRING_DATASOURCE_USERNAME
              value: root
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: root-password
            - name: FILE_UPLOADPATH
              value: /data/upload
          volumeMounts:
            - name: upload-data
              mountPath: /data/upload
          readinessProbe:
            tcpSocket:
              port: 9201
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9201
            initialDelaySeconds: 40
            periodSeconds: 20
      volumes:
        - name: upload-data
          persistentVolumeClaim:
            claimName: upload-data
---
apiVersion: v1
kind: Service
metadata:
  name: freshmall-user
  namespace: freshmall
spec:
  selector:
    app: freshmall-user
  ports:
    - port: 9201
      targetPort: 9201
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: freshmall-thing
  namespace: freshmall
spec:
  replicas: 1
  selector:
    matchLabels:
      app: freshmall-thing
  template:
    metadata:
      labels:
        app: freshmall-thing
    spec:
      containers:
        - name: app
          image: local/freshmall-thing:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 9202
          env:
            - name: SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR
              value: nacos:8848
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/freshmall_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=UTC
            - name: SPRING_DATASOURCE_USERNAME
              value: root
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: root-password
            - name: FILE_UPLOADPATH
              value: /data/upload
            - name: SPRING_REDIS_HOST
              value: redis
            - name: SPRING_REDIS_PORT
              value: "6379"
            - name: SPRING_REDIS_PASSWORD
              value: ""
            - name: SPRING_REDIS_DATABASE
              value: "0"
          volumeMounts:
            - name: upload-data
              mountPath: /data/upload
          readinessProbe:
            tcpSocket:
              port: 9202
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9202
            initialDelaySeconds: 40
            periodSeconds: 20
      volumes:
        - name: upload-data
          persistentVolumeClaim:
            claimName: upload-data
---
apiVersion: v1
kind: Service
metadata:
  name: freshmall-thing
  namespace: freshmall
spec:
  selector:
    app: freshmall-thing
  ports:
    - port: 9202
      targetPort: 9202
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: freshmall-order
  namespace: freshmall
spec:
  replicas: 1
  selector:
    matchLabels:
      app: freshmall-order
  template:
    metadata:
      labels:
        app: freshmall-order
    spec:
      containers:
        - name: app
          image: local/freshmall-order:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 9203
          env:
            - name: SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR
              value: nacos:8848
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/freshmall_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=UTC
            - name: SPRING_DATASOURCE_USERNAME
              value: root
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: root-password
            - name: ORDER_TIMEOUT_PENDING_PAY_MS
              value: "1800000"
            - name: ORDER_TIMEOUT_SCAN_INTERVAL_MS
              value: "60000"
            - name: ORDER_EVENT_DISPATCH_INTERVAL_MS
              value: "1000"
            - name: SPRING_RABBITMQ_HOST
              value: rabbitmq
            - name: SPRING_RABBITMQ_PORT
              value: "5672"
            - name: SPRING_RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: username
            - name: SPRING_RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: password
            - name: SPRING_RABBITMQ_VIRTUAL_HOST
              value: /
          readinessProbe:
            tcpSocket:
              port: 9203
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9203
            initialDelaySeconds: 40
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: freshmall-order
  namespace: freshmall
spec:
  selector:
    app: freshmall-order
  ports:
    - port: 9203
      targetPort: 9203
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: freshmall-gateway
  namespace: freshmall
spec:
  replicas: 1
  selector:
    matchLabels:
      app: freshmall-gateway
  template:
    metadata:
      labels:
        app: freshmall-gateway
    spec:
      containers:
        - name: app
          image: local/freshmall-gateway:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 9100
          env:
            - name: SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR
              value: nacos:8848
            - name: FILE_UPLOADPATH
              value: /data/upload
          volumeMounts:
            - name: upload-data
              mountPath: /data/upload
          readinessProbe:
            tcpSocket:
              port: 9100
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9100
            initialDelaySeconds: 40
            periodSeconds: 20
      volumes:
        - name: upload-data
          persistentVolumeClaim:
            claimName: upload-data
---
apiVersion: v1
kind: Service
metadata:
  name: freshmall-gateway
  namespace: freshmall
spec:
  type: NodePort
  selector:
    app: freshmall-gateway
  ports:
    - port: 9100
      targetPort: 9100
      nodePort: 31100
