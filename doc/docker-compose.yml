name: freshmall

services:
  mysql:
    image: mysql:8.0
    container_name: freshmall-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: freshmall_db
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/000_merged_init.sql:/docker-entrypoint-initdb.d/000_merged_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  nacos:
    image: nacos/nacos-server:v2.4.3
    container_name: freshmall-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: derby
      TZ: Asia/Shanghai
    ports:
      - "8848:8848"
      - "9848:9848"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8848/nacos/v1/console/health/readiness >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  user:
    image: local/freshmall-user:latest
    pull_policy: never
    build:
      context: ../freshmall-user
      dockerfile: ../doc/docker/Dockerfile.jvm
      args:
        JAR_FILE: target/freshmall-user-1.0.0.jar
    container_name: freshmall-user
    restart: unless-stopped
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/freshmall_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      FILE_UPLOADPATH: /data/upload
      TZ: Asia/Shanghai
    ports:
      - "9201:9201"
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
    volumes:
      - upload_data:/data/upload
    healthcheck:
      test: ["CMD-SHELL", "code=$$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:9201/); [ $$code -ge 200 ] && [ $$code -lt 500 ]"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  thing:
    image: local/freshmall-thing:latest
    pull_policy: never
    build:
      context: ../freshmall-thing
      dockerfile: ../doc/docker/Dockerfile.jvm
      args:
        JAR_FILE: target/freshmall-thing-1.0.0.jar
    container_name: freshmall-thing
    restart: unless-stopped
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/freshmall_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      FILE_UPLOADPATH: /data/upload
      TZ: Asia/Shanghai
    ports:
      - "9202:9202"
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
    volumes:
      - upload_data:/data/upload
    healthcheck:
      test: ["CMD-SHELL", "code=$$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:9202/); [ $$code -ge 200 ] && [ $$code -lt 500 ]"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  order:
    image: local/freshmall-order:latest
    pull_policy: never
    build:
      context: ../freshmall-order
      dockerfile: ../doc/docker/Dockerfile.jvm
      args:
        JAR_FILE: target/freshmall-order-1.0.0.jar
    container_name: freshmall-order
    restart: unless-stopped
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/freshmall_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      TZ: Asia/Shanghai
    ports:
      - "9203:9203"
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "code=$$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:9203/); [ $$code -ge 200 ] && [ $$code -lt 500 ]"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  gateway:
    image: local/freshmall-gateway:latest
    pull_policy: never
    build:
      context: ../freshmall-gateway
      dockerfile: ../doc/docker/Dockerfile.jvm
      args:
        JAR_FILE: target/freshmall-gateway-1.0.0.jar
    container_name: freshmall-gateway
    restart: unless-stopped
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      FILE_UPLOADPATH: /data/upload
      TZ: Asia/Shanghai
    ports:
      - "9100:9100"
    depends_on:
      user:
        condition: service_healthy
      thing:
        condition: service_healthy
      order:
        condition: service_healthy
    volumes:
      - upload_data:/data/upload
    healthcheck:
      test: ["CMD-SHELL", "code=$$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:9100/); [ $$code -ge 200 ] && [ $$code -lt 500 ]"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  mysql_data:
  upload_data: