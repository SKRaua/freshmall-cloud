server:
  port: 9202 # 商品服务端口

# 自定义文件上传路
File:
  # uploadPath: E:/test/ncp/freshmall/server/upload/
  uploadPath: ${FILE_UPLOADPATH:${user.home}/freshmall/upload}

spring:
  application:
    name: freshmall-thing
  cloud:
    nacos:
      discovery:
        server-addr: ${SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR:127.0.0.1:8848}

  # 数据源配
  datasource:
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/freshmall_db?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=UTC}
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource

    druid:
      initial-size: 5
      min-idle: 5
      maxActive: 20
      maxWait: 60000
      timeBetweenEvictionRunsMillis: 60000
      minEvictableIdleTimeMillis: 300000
      validationQuery: SELECT 1
      testWhileIdle: true
      testOnBorrow: false
      testOnReturn: false
      poolPreparedStatements: true
      maxPoolPreparedStatementPerConnectionSize: 20
      filters: stat,slf4j
      connectionProperties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000

  servlet:
    multipart:
      max-request-size: 10MB
      max-file-size: 1MB
      enabled: true

  # 静态资源映Spring Boot 2.x)
  web:
    resources:
      static-locations: file:${File.uploadPath}
  mvc:
    static-path-pattern: /staticfiles/**

  redis:
    host: ${SPRING_REDIS_HOST:127.0.0.1}
    port: ${SPRING_REDIS_PORT:6379}
    password: ${SPRING_REDIS_PASSWORD:}
    database: ${SPRING_REDIS_DATABASE:0}
    timeout: 3000ms

  cache:
    # 默认使用本地缓存（simple），避免开发环境未启动 Redis 导致请求失败。
    # 需要 Redis 缓存时，启动服务前设置: SPRING_CACHE_TYPE=redis
    type: ${SPRING_CACHE_TYPE:redis}
    redis:
      cache-null-values: false
      use-key-prefix: true
      key-prefix: "freshmall:"
      time-to-live: 30m

# 配置 MyBatis Plus
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
