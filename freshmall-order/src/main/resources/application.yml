server:
  port: 9203 # 订单服务端口

spring:
  application:
    name: freshmall-order
  cloud:
    nacos:
      discovery:
        server-addr: ${SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR:127.0.0.1:8848}

  # 数据源配置
  datasource:
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/freshmall_db?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=UTC}
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      maxActive: 20
      maxWait: 60000
      timeBetweenEvictionRunsMillis: 60000
      minEvictableIdleTimeMillis: 300000
      validationQuery: SELECT 1
      testWhileIdle: true
      testOnBorrow: false
      testOnReturn: false
      poolPreparedStatements: true
      maxPoolPreparedStatementPerConnectionSize: 20
      filters: stat,slf4j
      connectionProperties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000

  # 预留 RabbitMQ 连接参数，后续从 outbox 扩展到 MQ 时可直接启用。
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:127.0.0.1}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
    virtual-host: ${SPRING_RABBITMQ_VIRTUAL_HOST:/}

# 配置 MyBatis Plus
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

order:
  timeout:
    pending-pay-ms: ${ORDER_TIMEOUT_PENDING_PAY_MS:1800000}
    scan-interval-ms: ${ORDER_TIMEOUT_SCAN_INTERVAL_MS:60000}
  event:
    dispatch-interval-ms: ${ORDER_EVENT_DISPATCH_INTERVAL_MS:1000}
